services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: linux_playground
      POSTGRES_USER: linuxpg
      POSTGRES_PASSWORD: linuxpg
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linuxpg -d linux_playground"]
      interval: 2s
      timeout: 3s
      retries: 30

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgres://linuxpg:linuxpg@postgres:5432/linux_playground
      JWT_SECRET: dev-secret-change-me
      SESSION_TTL_MINUTES: 30
      PLAYGROUND_IMAGE: ubuntu:22.04
      PLAYGROUND_MEMORY_MB: 256
      PLAYGROUND_NANO_CPUS: 500000000
      CORS_ORIGIN: "*"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
      NEXT_PUBLIC_API_WS_URL: ws://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
