apiVersion: v1
kind: ConfigMap
metadata:
  name: linuxpg-web
  namespace: linux-playground
data:
  NEXT_PUBLIC_API_BASE_URL: "http://api.linux-playground.svc.cluster.local:8080"
  NEXT_PUBLIC_API_WS_URL: "ws://api.linux-playground.svc.cluster.local:8080"
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: linux-playground
spec:
  selector:
    app: web
  ports:
    - name: http
      port: 80
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: linux-playground
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: linux-playground-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: linuxpg-web

