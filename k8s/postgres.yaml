apiVersion: v1
kind: Secret
metadata:
  name: linuxpg-postgres
  namespace: linux-playground
type: Opaque
stringData:
  POSTGRES_DB: linux_playground
  POSTGRES_USER: linuxpg
  POSTGRES_PASSWORD: change-me
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: linux-playground
spec:
  selector:
    app: postgres
  ports:
    - name: pg
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: linux-playground
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
              name: pg
          envFrom:
            - secretRef:
                name: linuxpg-postgres
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi

